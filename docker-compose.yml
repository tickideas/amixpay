version: '3.9'

services:
  # ── API ──────────────────────────────────────────────────────────────────
  migrate:
    build:
      context: ./apps/api
    container_name: amixpay-migrate
    command: sh -c "npx knex migrate:latest --knexfile knexfile.js && npx knex seed:run --knexfile knexfile.js"
    env_file:
      - ./apps/api/.env
    environment:
      DB_HOST: postgres
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - amixpay-net
    restart: "no"

  api:
    build:
      context: ./apps/api
    container_name: amixpay-api
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api/.env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src  # Hot-reload in dev; remove for production
    restart: unless-stopped
    networks:
      - amixpay-net

  # ── Infrastructure ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: amixpay-postgres
    environment:
      POSTGRES_DB: amixpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - amixpay-net

  redis:
    image: redis:7-alpine
    container_name: amixpay-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - amixpay-net

volumes:
  postgres_data:
  redis_data:

networks:
  amixpay-net:
    driver: bridge
